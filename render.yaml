services:
  - type: web
    name: lywbu-wa-ai-bot
    env: node
    plan: free
    buildCommand: npm install && npx puppeteer install chrome@stable
    startCommand: npm start
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "false"
